name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download OpenCV iOS framework
        working-directory: /tmp
        run: |
          wget -q https://github.com/opencv/opencv/releases/download/4.13.0/opencv-4.13.0-ios-framework.zip
          unzip -q opencv-4.13.0-ios-framework.zip
      - name: Build for iOS (arm64)
        run: |
          mkdir build-ios && cd build-ios
          cmake .. \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DOpenCV_DIR=/tmp \
            -DINKSI_USE_OPENCV=ON
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-ios-arm64
          path: build-ios/libinksi_image.a
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-ios/libinksi_image.a
