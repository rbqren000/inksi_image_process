# OHOS 需本地 DevEco 环境编译，无法在 GitHub CI 执行。
# 编译 OpenCV 4.13.0 和 inksi_image 需要约 30 分钟。
#
# 使用方法：
#
#   1. 设置 OHOS NDK 路径（根据你的 DevEco 安装目录调整）：
#      export OHOS_NDK_HOME=/Applications/DevEco-Studio.app/Contents/tools/ohos-sdk/ohos-ndk
#      或 Windows: set OHOS_NDK_HOME=C:\Users\<user>\AppData\Local\Huawei\DevEcoStudio\ohos-ndk
#
#   ── 编译 OpenCV 4.13.0 ──
#   2. 下载源码：
#      wget https://github.com/opencv/opencv/archive/refs/tags/4.13.0.zip
#      unzip 4.13.0.zip
#
#   3. 编译 OpenCV（仅 arm64-v8a）：
#      mkdir opencv-ohos && cd opencv-ohos
#      cmake ../opencv-4.13.0 \
#        -DCMAKE_TOOLCHAIN_FILE=$OHOS_NDK_HOME/build/cmake/ohos.toolchain.cmake \
#        -DOHOS_ARCH=arm64-v8a \
#        -DCMAKE_INSTALL_PREFIX=/tmp/opencv-ohos-install \
#        -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF \
#        -DBUILD_opencv_apps=OFF -DBUILD_JAVA=OFF -DBUILD_PYTHON=OFF \
#        -DBUILD_opencv_js=OFF -DBUILD_opencv_ts=OFF \
#        -DWITH_IPP=OFF -DWITH_TBB=OFF -DWITH_OPENMP=OFF \
#        -DWITH_OPENCL=OFF -DWITH_FFMPEG=OFF -DWITH_GTK=OFF -DWITH_QT=OFF \
#        -DENABLE_PRECOMPILED_HEADERS=OFF \
#        -DCMAKE_BUILD_TYPE=Release
#      cmake --build . -j$(nproc)
#      cmake --install .
#
#   ── 编译 inksi_image ──
#   4. 构建 inksi_image：
#      mkdir build-ohos && cd build-ohos
#      cmake .. \
#        -DCMAKE_TOOLCHAIN_FILE=$OHOS_NDK_HOME/build/cmake/ohos.toolchain.cmake \
#        -DOHOS_ARCH=arm64-v8a \
#        -DINKSI_USE_OPENCV=ON \
#        -DOpenCV_DIR=/tmp/opencv-ohos-install/lib/cmake/opencv4 \
#        -DCMAKE_BUILD_TYPE=Release
#      cmake --build . -j$(nproc)
#
#   5. 产物: build-ohos/libinksi_image.so (arm64-v8a)

name: Build OHOS (manual)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "OHOS build requires local DevEco environment. See comment in this file."
