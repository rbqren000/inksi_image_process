name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows (x86_64)
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-windows-x86_64
          path: build-windows/Release/inksi_image.dll
