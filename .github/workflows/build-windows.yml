name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache OpenCV build (Windows)
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: C:\opencv-windows-install
          key: opencv-4.13.0-windows-x86_64-v2

      - name: Build OpenCV from source (Windows x86_64)
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl -L -o "${{ runner.temp }}\opencv-4.13.0.zip" https://github.com/opencv/opencv/archive/refs/tags/4.13.0.zip
          7z x "${{ runner.temp }}\opencv-4.13.0.zip" -o"${{ runner.temp }}" -y
          mkdir "${{ runner.temp }}\opencv-win-build"
          cd "${{ runner.temp }}\opencv-win-build"
          cmake "${{ runner.temp }}\opencv-4.13.0" `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_INSTALL_PREFIX=C:\opencv-windows-install `
            -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF `
            -DBUILD_opencv_apps=OFF -DBUILD_JAVA=OFF -DBUILD_PYTHON=OFF `
            -DBUILD_opencv_js=OFF -DBUILD_opencv_ts=OFF `
            -DWITH_IPP=OFF -DWITH_TBB=OFF -DWITH_OPENMP=OFF `
            -DWITH_OPENCL=OFF -DWITH_CUDA=OFF -DWITH_FFMPEG=OFF `
            -DWITH_GSTREAMER=OFF -DWITH_V4L=OFF -DWITH_GTK=OFF -DWITH_QT=OFF `
            -DWITH_OPENEXR=OFF `
            -DWITH_EIGEN=OFF `
            -DENABLE_PRECOMPILED_HEADERS=OFF `
            -DCMAKE_BUILD_TYPE=Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build . --config Release -j
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --install . --config Release
      - name: Build inksi_image for Windows x86_64
        shell: pwsh
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -DINKSI_USE_OPENCV=ON -DOpenCV_DIR="C:\opencv-windows-install" -DOpenCV_STATIC=ON
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build . --config Release -j
      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-windows-x86_64
          path: build-windows/Release/inksi_image.dll
      - name: Rename for Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Copy-Item build-windows/Release/inksi_image.dll inksi_image-windows-x86_64.dll
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inksi_image-windows-x86_64.dll
