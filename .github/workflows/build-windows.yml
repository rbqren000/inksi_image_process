name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download OpenCV Windows prebuilt
        shell: pwsh
        run: |
          curl -L -o "${{ runner.temp }}\opencv-windows.exe" https://github.com/opencv/opencv/releases/download/4.13.0/opencv-4.13.0-windows.exe
          7z x "${{ runner.temp }}\opencv-windows.exe" -o"${{ runner.temp }}\opencv"
          Write-Host "OpenCV extracted, listing contents:"
          Get-ChildItem "${{ runner.temp }}\opencv" -Depth 1 -Name
      - name: Build Windows (x86_64)
        shell: pwsh
        run: |
          $cvDir = "${{ runner.temp }}\opencv\opencv\build"
          Write-Host "OpenCV_DIR: $cvDir"
          mkdir build-windows
          cd build-windows
          cmake .. -DINKSI_USE_OPENCV=ON -DOpenCV_DIR="$cvDir"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build . --config Release -j
      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-windows-x86_64
          path: build-windows/Release/inksi_image.dll
      - name: Rename for Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Copy-Item build-windows/Release/inksi_image.dll inksi_image-windows-x86_64.dll
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inksi_image-windows-x86_64.dll
