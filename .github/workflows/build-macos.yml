name: Build macOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  OPENCV_VERSION: 4.13.0

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache OpenCV build
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: /tmp/opencv-install-universal
          key: opencv-${{ env.OPENCV_VERSION }}-macos-universal-static

      - name: Build OpenCV from source
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        working-directory: /tmp
        run: |
          wget -q https://github.com/opencv/opencv/archive/refs/tags/${{ env.OPENCV_VERSION }}.zip
          unzip -q ${{ env.OPENCV_VERSION }}.zip
          mkdir opencv-build && cd opencv-build
          cmake ../opencv-${{ env.OPENCV_VERSION }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/opencv-install-universal \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF \
            -DBUILD_opencv_apps=OFF -DBUILD_JAVA=OFF -DBUILD_PYTHON=OFF \
            -DBUILD_opencv_js=OFF -DBUILD_opencv_ts=OFF \
            -DWITH_IPP=OFF -DWITH_TBB=OFF -DWITH_OPENMP=OFF \
            -DWITH_OPENCL=OFF -DWITH_CUDA=OFF -DWITH_FFMPEG=OFF \
            -DWITH_GSTREAMER=OFF -DWITH_V4L=OFF -DWITH_GTK=OFF -DWITH_QT=OFF \
            -DENABLE_PRECOMPILED_HEADERS=OFF
          cmake --build . -j$(sysctl -n hw.ncpu)
          cmake --install .

      - name: Build inksi_image
        run: |
          mkdir build-macos && cd build-macos
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DINKSI_USE_OPENCV=ON \
            -DOpenCV_DIR=/tmp/opencv-install-universal/lib/cmake/opencv4
          cmake --build . -j$(sysctl -n hw.ncpu)

      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-macos-universal
          path: build-macos/libinksi_image.dylib
      - name: Rename for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: cp build-macos/libinksi_image.dylib inksi_image-macos-universal.dylib
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inksi_image-macos-universal.dylib
