name: Build macOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  OPENCV_VERSION: 4.13.0

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Cache OpenCV build (macOS ${{ matrix.arch }})
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: /tmp/opencv-macos-${{ matrix.arch }}
          key: opencv-${{ env.OPENCV_VERSION }}-macos-${{ matrix.arch }}-v2

      - name: Build OpenCV from source (${{ matrix.arch }})
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        working-directory: /tmp
        run: |
          wget -q https://github.com/opencv/opencv/archive/refs/tags/${{ env.OPENCV_VERSION }}.zip
          unzip -q ${{ env.OPENCV_VERSION }}.zip
          mkdir opencv-build-${{ matrix.arch }} && cd opencv-build-${{ matrix.arch }}
          cmake ../opencv-${{ env.OPENCV_VERSION }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DWITH_KLEIDICV=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_INSTALL_PREFIX=/tmp/opencv-macos-${{ matrix.arch }} \
            -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF \
            -DBUILD_opencv_apps=OFF -DBUILD_JAVA=OFF -DBUILD_PYTHON=OFF \
            -DBUILD_opencv_js=OFF -DBUILD_opencv_ts=OFF \
            -DWITH_IPP=OFF -DWITH_TBB=OFF -DWITH_OPENMP=OFF \
            -DWITH_OPENCL=OFF -DWITH_CUDA=OFF -DWITH_FFMPEG=OFF \
            -DWITH_GSTREAMER=OFF -DWITH_V4L=OFF -DWITH_GTK=OFF -DWITH_QT=OFF \
            -DWITH_OPENEXR=OFF \
            -DWITH_AVIF=OFF -DWITH_WEBP=OFF -DWITH_JASPER=OFF \
            -DWITH_EIGEN=OFF \
            -DENABLE_PRECOMPILED_HEADERS=OFF
          cmake --build . -j$(sysctl -n hw.ncpu)
          cmake --install .

      - name: Build inksi_image (${{ matrix.arch }})
        run: |
          mkdir build-macos-${{ matrix.arch }} && cd build-macos-${{ matrix.arch }}
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DINKSI_USE_OPENCV=ON \
            -DOpenCV_DIR=/tmp/opencv-macos-${{ matrix.arch }}/lib/cmake/opencv4
          cmake --build . -j$(sysctl -n hw.ncpu)

      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-macos-${{ matrix.arch }}
          path: build-macos-${{ matrix.arch }}/libinksi_image.dylib

  # ── 合并为 universal ──
  universal:
    needs: build
    if: always()
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: inksi_image-macos-arm64
          path: artifacts/arm64
      - uses: actions/download-artifact@v4
        with:
          name: inksi_image-macos-x86_64
          path: artifacts/x86_64

      - name: Create universal binary + rename
        run: |
          lipo -create \
            artifacts/arm64/libinksi_image.dylib \
            artifacts/x86_64/libinksi_image.dylib \
            -output inksi_image-macos-universal.dylib
          echo "Architectures: $(lipo -info inksi_image-macos-universal.dylib | sed 's/.*://')"

      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-macos-universal
          path: inksi_image-macos-universal.dylib

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inksi_image-macos-universal.dylib
