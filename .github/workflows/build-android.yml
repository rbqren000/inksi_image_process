name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
      - name: Download OpenCV Android SDK
        working-directory: /tmp
        run: |
          wget -q https://github.com/opencv/opencv/releases/download/4.13.0/opencv-4.13.0-android-sdk.zip
          unzip -q opencv-4.13.0-android-sdk.zip
      - name: Build for arm64-v8a
        run: |
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DOpenCV_DIR=/tmp/OpenCV-android-sdk/sdk/native/jni \
            -DINKSI_USE_OPENCV=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: inksi_image-android-arm64-v8a
          path: build-android/libinksi_image.a
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-android/libinksi_image.a
